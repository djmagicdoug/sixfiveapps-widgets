<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Budget</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100%; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #222; }

.wrap { width: 100%; max-width: 480px; margin: 0 auto; padding: 16px 16px 32px; }

/* ── PAGE TITLE ── */
.page-title {
  font-size: 22px;
  font-weight: 700;
  color: #222;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── CARD ── */
.card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  margin-bottom: 12px;
}

/* ── SUMMARY CHIPS ── */
.chips {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.chip {
  background: #f5f5f5;
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
}
.chip-label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #888;
  margin-bottom: 4px;
}
.chip-value {
  font-size: 16px;
  font-weight: 700;
  color: #222;
}
.chip-value.good { color: #3b7d0f; }
.chip-value.warn { color: #c07000; }
.chip-value.over { color: #c0392b; }

/* ── PROGRESS ── */
.prog-track {
  height: 8px;
  border-radius: 999px;
  background: #e8e8e8;
  overflow: hidden;
  margin-bottom: 4px;
}
.prog-bar {
  height: 100%;
  border-radius: 999px;
  background: #343D46;
  transition: width 300ms ease, background 300ms ease;
  width: 0%;
}
.prog-bar.warn { background: #c07000; }
.prog-bar.over { background: #c0392b; width: 100% !important; }
.prog-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #888;
}

/* ── FIELDS ── */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.f-label { font-size: 13px; font-weight: 600; color: #444; }
.f-input {
  width: 100%;
  height: 44px;
  border: 1.5px solid #ddd;
  border-radius: 10px;
  background: #fafafa;
  padding: 0 12px;
  font-size: 16px;
  color: #222;
  outline: none;
  transition: border-color 160ms, box-shadow 160ms;
}
.f-input::placeholder { color: #bbb; }
.f-input:focus { border-color: #343D46; box-shadow: 0 0 0 3px rgba(52,61,70,.1); background: #fff; }
.f-error { min-height: 16px; font-size: 12px; color: #c0392b; }

/* ── ADD ROW ── */
.add-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }

/* ── BUTTONS ── */
.btn-primary {
  height: 44px;
  padding: 0 16px;
  border: none;
  border-radius: 10px;
  background: #343D46;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 160ms;
}
.btn-primary:active { opacity: .8; }
.btn-ghost {
  height: 36px;
  padding: 0 12px;
  border: 1.5px solid #343D46;
  border-radius: 10px;
  background: transparent;
  color: #343D46;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.btn-ghost:active { opacity: .75; }

/* ── SECTION HEADING ── */
.section-heading {
  font-size: 14px;
  font-weight: 700;
  color: #343D46;
  margin-bottom: 10px;
}

/* ── EXPENSE LIST ── */
.expense-list { display: flex; flex-direction: column; gap: 8px; }
.expense-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-radius: 10px;
  background: #f5f5f5;
  animation: rowIn .18s ease-out both;
}
.expense-lbl { flex: 1; font-size: 14px; font-weight: 600; color: #222; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.expense-amt { font-size: 14px; font-weight: 700; color: #343D46; white-space: nowrap; }
.expense-del {
  width: 36px; height: 36px;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  background: #fff;
  color: #999;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 160ms, border-color 160ms;
}
.expense-del:hover { color: #c0392b; border-color: #c0392b; }
.expense-empty { text-align: center; padding: 16px 0; font-size: 13px; color: #bbb; }

.footer-note { text-align: center; font-size: 11px; color: #bbb; margin-top: 12px; }
.top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }

@keyframes rowIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-row">
    <div class="page-title">💰 My Budget</div>
    <button class="btn-ghost" id="resetBtn">Reset</button>
  </div>
  <p style="font-size:13px;color:#888;margin-bottom:14px;line-height:1.5;">Set your budget, log your spending, and see what's left.</p>

  <!-- BUDGET INPUT -->
  <div class="card">
    <div class="field">
      <label class="f-label" for="budgetInput">Budget for this outing</label>
      <input id="budgetInput" class="f-input" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01" autocomplete="off" />
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="card">
    <div class="chips">
      <div class="chip"><span class="chip-label">Budget</span><span class="chip-value" id="outBudget">$0.00</span></div>
      <div class="chip"><span class="chip-label">Spent</span><span class="chip-value" id="outSpent">$0.00</span></div>
      <div class="chip"><span class="chip-label">Left</span><span class="chip-value good" id="outRemaining">$0.00</span></div>
    </div>
    <div class="prog-track"><div class="prog-bar" id="progBar"></div></div>
    <div class="prog-labels"><span>$0</span><span id="progPct">0% used</span><span id="progMax">$0.00</span></div>
  </div>

  <!-- ADD EXPENSE -->
  <div class="card">
    <div class="section-heading">Add Expense</div>
    <div class="field">
      <label class="f-label" for="expLabel">Description</label>
      <input id="expLabel" class="f-input" type="text" placeholder="e.g. Lunch, parking, gas" maxlength="40" autocomplete="off" />
    </div>
    <div class="add-row">
      <div class="field">
        <label class="f-label" for="expAmount">Amount</label>
        <input id="expAmount" class="f-input" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01" autocomplete="off" />
      </div>
      <button class="btn-primary" id="addExpBtn">+ Add</button>
    </div>
    <div class="f-error" id="expError" aria-live="polite"></div>
  </div>

  <!-- EXPENSE LOG -->
  <div class="card">
    <div class="section-heading">Expense Log</div>
    <div class="expense-list" id="expList">
      <div class="expense-empty" id="expEmpty">No expenses yet.</div>
    </div>
  </div>

  <div class="footer-note">Saved on this device only.</div>

</div>
<script>
(function(){
  var KEY = 'mybudget_v1';
  var budget = 0;
  var expenses = [];

  function load() {
    try {
      var r = localStorage.getItem(KEY);
      if (r) { var d = JSON.parse(r); budget = pa(d.budget); expenses = Array.isArray(d.expenses) ? d.expenses : []; }
    } catch(e) {}
    applyState();
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify({ budget: budget, expenses: expenses })); } catch(e) {}
  }

  function pa(v) { var n = parseFloat(String(v)); return isFinite(n) ? n : 0; }
  function money(n) { var v = Number(n); return '$' + (isFinite(v) ? v : 0).toFixed(2); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function totalSpent() {
    return expenses.reduce(function(s,e){ return s + (Number(e.amount)||0); }, 0);
  }

  function updateSummary() {
    var spent = totalSpent();
    var rem = budget - spent;
    var pct = budget > 0 ? (spent / budget) * 100 : 0;
    var fill = Math.min(100, Math.max(0, pct));

    document.getElementById('outBudget').textContent = money(budget);
    document.getElementById('outSpent').textContent = money(spent);
    document.getElementById('outRemaining').textContent = money(rem);

    var remEl = document.getElementById('outRemaining');
    remEl.className = 'chip-value';
    if (budget <= 0 || (rem > 0 && pct < 80)) remEl.classList.add('good');
    else if (rem < 0) remEl.classList.add('over');
    else remEl.classList.add('warn');

    var bar = document.getElementById('progBar');
    bar.style.width = fill + '%';
    bar.className = 'prog-bar';
    if (rem < 0) bar.classList.add('over');
    else if (pct >= 80) bar.classList.add('warn');

    document.getElementById('progPct').textContent = Math.round(fill) + '% used';
    document.getElementById('progMax').textContent = money(budget);
  }

  function renderExpenses() {
    var list = document.getElementById('expList');
    var empty = document.getElementById('expEmpty');
    list.querySelectorAll('.expense-item').forEach(function(el){ el.parentNode.removeChild(el); });
    if (!expenses.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    expenses.forEach(function(exp, i) {
      var row = document.createElement('div');
      row.className = 'expense-item';
      row.innerHTML = '<span class="expense-lbl">' + esc(exp.label) + '</span>' +
        '<span class="expense-amt">' + money(exp.amount) + '</span>' +
        '<button class="expense-del" data-idx="' + i + '" aria-label="Remove">&times;</button>';
      list.appendChild(row);
    });
    list.querySelectorAll('.expense-del').forEach(function(btn){
      btn.addEventListener('click', function(){
        expenses.splice(parseInt(btn.getAttribute('data-idx'), 10), 1);
        save(); updateSummary(); renderExpenses();
      });
    });
  }

  function applyState() {
    document.getElementById('budgetInput').value = budget > 0 ? budget.toFixed(2) : '';
    updateSummary(); renderExpenses();
  }

  document.getElementById('budgetInput').addEventListener('input', function(){
    budget = Math.max(0, pa(this.value)); save(); updateSummary();
  });

  document.getElementById('addExpBtn').addEventListener('click', function(){
    var label = document.getElementById('expLabel').value.trim();
    var amount = pa(document.getElementById('expAmount').value);
    var err = '';
    if (!label && amount <= 0) err = 'Enter a description and amount.';
    else if (!label) err = 'Enter a description.';
    else if (amount <= 0) err = 'Enter a valid amount greater than $0.';
    document.getElementById('expError').textContent = err;
    if (err) return;
    expenses.push({ label: label, amount: amount });
    document.getElementById('expLabel').value = '';
    document.getElementById('expAmount').value = '';
    document.getElementById('expError').textContent = '';
    save(); updateSummary(); renderExpenses();
    document.getElementById('expLabel').focus();
  });

  document.getElementById('expLabel').addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('expAmount').focus(); }
  });
  document.getElementById('expAmount').addEventListener('keydown', function(e){
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('addExpBtn').click(); }
  });

  document.getElementById('resetBtn').addEventListener('click', function(){
    budget = 0; expenses = [];
    document.getElementById('budgetInput').value = '';
    document.getElementById('expLabel').value = '';
    document.getElementById('expAmount').value = '';
    document.getElementById('expError').textContent = '';
    save(); updateSummary(); renderExpenses();
  });

  load();
})();
</script>
</body>
</html>
