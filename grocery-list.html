<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery List</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F8F6F3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 16px;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    padding: 20px;
    max-width: 480px;
    margin: 0 auto;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #B3995B;
    margin-bottom: 4px;
  }

  h1 {
    font-family: Georgia, serif;
    font-size: 22px;
    color: #1a1a1a;
    margin-bottom: 16px;
  }

  /* Input row */
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .input-row input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    border: 1.5px solid #e0ddd8;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    background: #FAFAF8;
    color: #1a1a1a;
    transition: border-color 0.15s;
  }

  .input-row input[type="text"]:focus {
    border-color: #C65E2D;
  }

  .input-row input::placeholder { color: #aaa; }

  .btn-add {
    background: #C65E2D;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-add:hover { background: #b0521f; }

  /* Quick add pills */
  .quick-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #999;
    margin-bottom: 8px;
  }

  .quick-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 18px;
  }

  .pill {
    background: #F1EDE7;
    border: none;
    border-radius: 14px;
    padding: 6px 13px;
    font-size: 13px;
    color: #5a4a3a;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }

  .pill:hover { background: #C65E2D; color: #fff; }

  /* Progress */
  .progress-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
  }

  .progress-bar {
    background: #eee;
    border-radius: 99px;
    height: 6px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #C65E2D;
    border-radius: 99px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* List */
  .list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
    min-height: 40px;
  }

  .item {
    background: #FAFAF8;
    border-radius: 10px;
    padding: 10px 12px;
  }

  .item-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #C65E2D;
    cursor: pointer;
    flex-shrink: 0;
  }

  .item-text {
    flex: 1;
    font-size: 15px;
    color: #1a1a1a;
  }

  .item.checked .item-text {
    text-decoration: line-through;
    color: #aaa;
  }

  .item-delete {
    background: none;
    border: none;
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
  }

  .item-delete:hover { color: #C65E2D; }

  /* Qty + Price row */
  .item-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    padding-left: 28px;
  }

  .qty-group {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1.5px solid #e0ddd8;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
  }

  .qty-btn {
    background: none;
    border: none;
    width: 28px;
    height: 28px;
    font-size: 16px;
    cursor: pointer;
    color: #C65E2D;
    font-weight: 700;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qty-btn:hover { background: #F1EDE7; }

  .qty-display {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    min-width: 22px;
    text-align: center;
  }

  .price-wrap {
    display: flex;
    align-items: center;
    border: 1.5px solid #e0ddd8;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
  }

  .price-symbol {
    padding: 0 6px;
    font-size: 13px;
    color: #999;
    background: #F8F6F3;
    border-right: 1px solid #e0ddd8;
    height: 28px;
    display: flex;
    align-items: center;
  }

  .price-input {
    width: 68px;
    height: 28px;
    border: none;
    outline: none;
    font-size: 14px;
    padding: 0 6px;
    color: #1a1a1a;
    background: #fff;
    font-family: inherit;
  }

  .item-subtotal {
    margin-left: auto;
    font-size: 13px;
    color: #B3995B;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Running total */
  .total-bar {
    background: #F1EDE7;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .total-label {
    font-size: 13px;
    color: #5a4a3a;
    font-weight: 600;
  }

  .total-amount {
    font-size: 20px;
    font-weight: 700;
    font-family: Georgia, serif;
    color: #C65E2D;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    color: #bbb;
    font-size: 14px;
    padding: 20px 0;
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 8px;
  }

  .btn-secondary {
    flex: 1;
    background: #F1EDE7;
    border: none;
    border-radius: 10px;
    padding: 9px;
    font-size: 13px;
    color: #5a4a3a;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }

  .btn-secondary:hover { background: #e5ddd4; }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">My List</div>
  <h1>🛒 Grocery List</h1>

  <div class="input-row">
    <input type="text" id="groceryInput" placeholder="Add an item..." autocomplete="off" />
    <button class="btn-add" onclick="addFromInput()">+ Add</button>
  </div>

  <div class="quick-label">Quick Add</div>
  <div class="quick-pills">
    <button class="pill" onclick="quickAdd('Milk')">+ Milk</button>
    <button class="pill" onclick="quickAdd('Eggs')">+ Eggs</button>
    <button class="pill" onclick="quickAdd('Butter')">+ Butter</button>
    <button class="pill" onclick="quickAdd('Cheese')">+ Cheese</button>
    <button class="pill" onclick="quickAdd('Chicken')">+ Chicken</button>
    <button class="pill" onclick="quickAdd('Ground Beef')">+ Ground Beef</button>
    <button class="pill" onclick="quickAdd('Bread')">+ Bread</button>
    <button class="pill" onclick="quickAdd('Pasta')">+ Pasta</button>
    <button class="pill" onclick="quickAdd('Rice')">+ Rice</button>
    <button class="pill" onclick="quickAdd('Bananas')">+ Bananas</button>
    <button class="pill" onclick="quickAdd('Apples')">+ Apples</button>
    <button class="pill" onclick="quickAdd('Toilet Paper')">+ Toilet Paper</button>
  </div>

  <div class="progress-row">
    <span id="progressText">0 of 0 checked off</span>
    <span id="progressPercent">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="list" id="groceryList"></div>

  <div class="total-bar" id="totalBar" style="display:none;">
    <span class="total-label">Estimated Total</span>
    <span class="total-amount" id="totalAmount">$0.00</span>
  </div>

  <div class="actions" id="actions" style="display:none;">
    <button class="btn-secondary" onclick="clearChecked()">Clear Checked</button>
    <button class="btn-secondary" onclick="clearAll()">Clear All</button>
  </div>
</div>

<script>
  var items = JSON.parse(localStorage.getItem('groceryItems2') || '[]');

  function save() {
    localStorage.setItem('groceryItems2', JSON.stringify(items));
  }

  function makeId() {
    return Date.now() + '_' + Math.floor(Math.random() * 100000);
  }

  function quickAdd(name) {
    items.push({ text: name, checked: false, qty: 1, price: '', id: makeId() });
    save();
    render();
  }

  function addFromInput() {
    var input = document.getElementById('groceryInput');
    var val = input.value.trim();
    if (!val) return;
    items.push({ text: val, checked: false, qty: 1, price: '', id: makeId() });
    input.value = '';
    input.focus();
    save();
    render();
  }

  function toggleItem(id) {
    for (var i = 0; i < items.length; i++) {
      if (items[i].id === id) { items[i].checked = !items[i].checked; break; }
    }
    save(); render();
  }

  function changeQty(id, delta) {
    for (var i = 0; i < items.length; i++) {
      if (items[i].id === id) {
        items[i].qty = Math.max(1, (items[i].qty || 1) + delta);
        break;
      }
    }
    save(); render();
  }

  function updatePrice(id, val) {
    for (var i = 0; i < items.length; i++) {
      if (items[i].id === id) { items[i].price = val; break; }
    }
    save(); renderTotal();
  }

  function deleteItem(id) {
    items = items.filter(function(item) { return item.id !== id; });
    save(); render();
  }

  function clearChecked() {
    items = items.filter(function(item) { return !item.checked; });
    save(); render();
  }

  function clearAll() {
    items = [];
    save(); render();
  }

  function renderTotal() {
    var total = 0;
    var hasAnyPrice = false;
    items.forEach(function(item) {
      var p = parseFloat(item.price);
      if (!isNaN(p) && p > 0) {
        hasAnyPrice = true;
        total += p * (item.qty || 1);
      }
    });
    var bar = document.getElementById('totalBar');
    if (hasAnyPrice && items.length > 0) {
      bar.style.display = 'flex';
      document.getElementById('totalAmount').textContent = '$' + total.toFixed(2);
    } else {
      bar.style.display = 'none';
    }
  }

  function render() {
    var listEl = document.getElementById('groceryList');
    var total = items.length;
    var done = items.filter(function(i) { return i.checked; }).length;
    var pct = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById('progressText').textContent = done + ' of ' + total + ' checked off';
    document.getElementById('progressPercent').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('actions').style.display = total > 0 ? 'flex' : 'none';

    if (total === 0) {
      listEl.innerHTML = '<div class="empty-state">Your list is empty.<br>Add items above or tap Quick Add.</div>';
      renderTotal();
      return;
    }

    listEl.innerHTML = '';

    items.forEach(function(item) {
      var itemId = item.id;
      var qty = item.qty || 1;
      var priceVal = item.price || '';
      var p = parseFloat(priceVal);
      var subtotal = (!isNaN(p) && p > 0) ? '$' + (p * qty).toFixed(2) : '';

      var div = document.createElement('div');
      div.className = 'item' + (item.checked ? ' checked' : '');

      // Top row: checkbox + name + delete
      var topRow = document.createElement('div');
      topRow.className = 'item-top';

      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = item.checked;
      cb.onclick = (function(id) { return function() { toggleItem(id); }; })(itemId);

      var span = document.createElement('span');
      span.className = 'item-text';
      span.textContent = item.text;

      var del = document.createElement('button');
      del.className = 'item-delete';
      del.textContent = '×';
      del.onclick = (function(id) { return function() { deleteItem(id); }; })(itemId);

      topRow.appendChild(cb);
      topRow.appendChild(span);
      topRow.appendChild(del);

      // Controls row: qty +/- + price + subtotal
      var ctrlRow = document.createElement('div');
      ctrlRow.className = 'item-controls';

      // Qty group
      var qtyGroup = document.createElement('div');
      qtyGroup.className = 'qty-group';

      var minusBtn = document.createElement('button');
      minusBtn.className = 'qty-btn';
      minusBtn.textContent = '−';
      minusBtn.onclick = (function(id) { return function() { changeQty(id, -1); }; })(itemId);

      var qtyDisp = document.createElement('span');
      qtyDisp.className = 'qty-display';
      qtyDisp.textContent = qty;

      var plusBtn = document.createElement('button');
      plusBtn.className = 'qty-btn';
      plusBtn.textContent = '+';
      plusBtn.onclick = (function(id) { return function() { changeQty(id, 1); }; })(itemId);

      qtyGroup.appendChild(minusBtn);
      qtyGroup.appendChild(qtyDisp);
      qtyGroup.appendChild(plusBtn);

      // Price input
      var priceWrap = document.createElement('div');
      priceWrap.className = 'price-wrap';

      var priceSym = document.createElement('span');
      priceSym.className = 'price-symbol';
      priceSym.textContent = '$';

      var priceInp = document.createElement('input');
      priceInp.type = 'number';
      priceInp.className = 'price-input';
      priceInp.placeholder = '0.00';
      priceInp.min = '0';
      priceInp.step = '0.01';
      priceInp.value = priceVal;
      priceInp.oninput = (function(id) { return function() { updatePrice(id, this.value); }; })(itemId);

      priceWrap.appendChild(priceSym);
      priceWrap.appendChild(priceInp);

      // Subtotal
      var subEl = document.createElement('span');
      subEl.className = 'item-subtotal';
      subEl.textContent = subtotal;

      ctrlRow.appendChild(qtyGroup);
      ctrlRow.appendChild(priceWrap);
      ctrlRow.appendChild(subEl);

      div.appendChild(topRow);
      div.appendChild(ctrlRow);
      listEl.appendChild(div);
    });

    renderTotal();
  }

  document.getElementById('groceryInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addFromInput();
  });

  render();
</script>

</body>
</html>
