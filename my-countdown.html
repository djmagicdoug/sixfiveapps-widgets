<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Countdown</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 16px;
  }

  .wrap { max-width: 480px; margin: 0 auto; }

  /* ── TITLE ── */
  .page-title {
    font-size: 22px;
    font-weight: 700;
    color: #222;
    margin-bottom: 6px;
  }

  .descriptor {
    font-size: 13px;
    color: #888;
    line-height: 1.5;
    margin-bottom: 14px;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    margin-bottom: 12px;
  }

  /* ── FIELDS ── */
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .f-label { font-size: 13px; font-weight: 600; color: #444; }

  .f-input {
    width: 100%;
    height: 44px;
    border: 1.5px solid #ddd;
    border-radius: 10px;
    background: #fafafa;
    padding: 0 12px;
    font-size: 16px;
    color: #222;
    outline: none;
    font-family: inherit;
    transition: border-color 160ms, box-shadow 160ms;
  }

  .f-input::placeholder { color: #bbb; }
  .f-input:focus { border-color: #343D46; box-shadow: 0 0 0 3px rgba(52,61,70,.1); background: #fff; }

  .add-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }

  .btn-primary {
    height: 44px;
    padding: 0 18px;
    border: none;
    border-radius: 10px;
    background: #343D46;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 160ms;
    font-family: inherit;
  }

  .btn-primary:active { opacity: .8; }

  .f-error { min-height: 16px; font-size: 12px; color: #c0392b; }

  /* ── COUNTDOWN CARDS ── */
  .countdown-list { display: flex; flex-direction: column; gap: 10px; }

  .countdown-card {
    background: #fff;
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    position: relative;
    animation: cardIn .2s ease-out both;
  }

  .countdown-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
  }

  .countdown-label {
    font-size: 15px;
    font-weight: 700;
    color: #222;
    flex: 1;
    word-break: break-word;
  }

  .countdown-delete {
    width: 32px;
    height: 32px;
    border: none;
    background: #f5f5f5;
    border-radius: 8px;
    color: #999;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: color .15s, background .15s;
  }

  .countdown-delete:hover { color: #c0392b; background: #fbeaea; }

  .countdown-body {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .countdown-number {
    font-size: 40px;
    font-weight: 700;
    color: #343D46;
    line-height: 1;
  }

  .countdown-unit {
    font-size: 15px;
    font-weight: 600;
    color: #888;
  }

  .countdown-date {
    font-size: 12px;
    color: #aaa;
    margin-top: 6px;
  }

  .countdown-card.today .countdown-number { color: #3b7d0f; }
  .countdown-card.past .countdown-number { color: #c0392b; }
  .countdown-card.past .countdown-unit { color: #c0392b; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    color: #bbb;
    font-size: 14px;
    padding: 24px 0;
    line-height: 1.6;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    margin-top: 12px;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="page-title">📅 My Countdown</div>
  <p class="descriptor">Track the days until trips, deadlines, birthdays, or anything worth counting down to.</p>

  <!-- ADD NEW -->
  <div class="card">
    <div class="field">
      <label class="f-label" for="eventLabel">What are you counting down to?</label>
      <input id="eventLabel" class="f-input" type="text" placeholder="e.g. Vacation, Anniversary, Move-in day" maxlength="40" autocomplete="off" />
    </div>
    <div class="add-row">
      <div class="field">
        <label class="f-label" for="eventDate">Date</label>
        <input id="eventDate" class="f-input" type="date" autocomplete="off" />
      </div>
      <button class="btn-primary" id="addBtn">+ Add</button>
    </div>
    <div class="f-error" id="formError" aria-live="polite"></div>
  </div>

  <!-- LIST -->
  <div class="countdown-list" id="countdownList"></div>

  <div class="footer-note">Saved on this device only.</div>

</div>
<script>
(function() {
  var STORAGE_KEY = 'myCountdown_v1';
  var events = [];

  function load() {
    try { var r = localStorage.getItem(STORAGE_KEY); events = r ? JSON.parse(r) : []; } catch(e) { events = []; }
    render();
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(events)); } catch(e) {}
  }

  function makeId() { return Date.now() + '_' + Math.floor(Math.random() * 100000); }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function daysUntil(dateStr) {
    var target = new Date(dateStr + 'T00:00:00');
    var now = new Date();
    var todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var diffMs = target - todayMidnight;
    return Math.round(diffMs / (1000 * 60 * 60 * 24));
  }

  function formatDateDisplay(dateStr) {
    var d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function addEvent() {
    var label = document.getElementById('eventLabel').value.trim();
    var date = document.getElementById('eventDate').value;
    var err = document.getElementById('formError');

    if (!label && !date) { err.textContent = 'Enter a label and pick a date.'; return; }
    if (!label) { err.textContent = 'Enter a label for this countdown.'; return; }
    if (!date) { err.textContent = 'Pick a date.'; return; }

    err.textContent = '';
    events.push({ id: makeId(), label: label, date: date });
    events.sort(function(a, b) { return new Date(a.date) - new Date(b.date); });

    document.getElementById('eventLabel').value = '';
    document.getElementById('eventDate').value = '';

    save(); render();
  }

  function deleteEvent(id) {
    events = events.filter(function(e) { return e.id !== id; });
    save(); render();
  }

  function render() {
    var list = document.getElementById('countdownList');
    list.innerHTML = '';

    if (!events.length) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No countdowns yet. Add a date above to get started.';
      list.appendChild(empty);
      return;
    }

    events.forEach(function(ev) {
      var days = daysUntil(ev.date);
      var card = document.createElement('article');
      card.className = 'countdown-card';

      var numberText, unitText;
      if (days === 0) {
        card.classList.add('today');
        numberText = '🎉'; unitText = "It's today!";
      } else if (days < 0) {
        card.classList.add('past');
        numberText = Math.abs(days);
        unitText = Math.abs(days) === 1 ? 'day ago' : 'days ago';
      } else {
        numberText = days;
        unitText = days === 1 ? 'day left' : 'days left';
      }

      var top = document.createElement('div'); top.className = 'countdown-top';
      var label = document.createElement('div'); label.className = 'countdown-label'; label.textContent = ev.label;
      var del = document.createElement('button'); del.type = 'button'; del.className = 'countdown-delete';
      del.textContent = '×'; del.setAttribute('aria-label', 'Delete countdown');
      del.addEventListener('click', function() { deleteEvent(ev.id); });
      top.appendChild(label); top.appendChild(del);

      var body = document.createElement('div'); body.className = 'countdown-body';
      var num = document.createElement('span'); num.className = 'countdown-number'; num.textContent = numberText;
      var unit = document.createElement('span'); unit.className = 'countdown-unit'; unit.textContent = unitText;
      body.appendChild(num); body.appendChild(unit);

      var dateLine = document.createElement('div'); dateLine.className = 'countdown-date';
      dateLine.textContent = formatDateDisplay(ev.date);

      card.appendChild(top); card.appendChild(body); card.appendChild(dateLine);
      list.appendChild(card);
    });
  }

  document.getElementById('addBtn').addEventListener('click', addEvent);
  document.getElementById('eventLabel').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('eventDate').focus(); }
  });
  document.getElementById('eventDate').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addEvent(); }
  });

  load();
})();
</script>
</body>
</html>
