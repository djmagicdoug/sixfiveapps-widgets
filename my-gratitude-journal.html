<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratitude Journal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF6EF;
    --sage: #B6C9AE;
    --sage-deep: #8FA886;
    --pink: #E8C9CE;
    --pink-deep: #D9A7AF;
    --text: #4A4A45;
    --text-soft: #8A8A82;
    --card: #FFFFFF;
  }

  body {
    background: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .encouragement {
    font-size: 15px;
    color: var(--sage-deep);
    font-style: italic;
  }

  /* ── TODAY CARD ── */
  .today-card {
    background: var(--card);
    border-radius: 28px;
    padding: 32px 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.05);
    margin-bottom: 36px;
  }

  .prompt-text {
    font-size: 19px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 24px;
  }

  .gratitude-input {
    width: 100%;
    border: none;
    background: var(--cream);
    border-radius: 18px;
    padding: 16px 20px;
    font-size: 16px;
    color: var(--text);
    outline: none;
    border: 2px solid transparent;
    transition: border-color 0.2s ease, background 0.2s ease;
    font-family: inherit;
  }

  .gratitude-input:focus {
    border-color: var(--sage);
    background: #fff;
  }

  .gratitude-input::placeholder {
    color: var(--text-soft);
  }

  .save-btn {
    width: 100%;
    background: var(--sage);
    color: #fff;
    border: none;
    border-radius: 18px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
    font-family: inherit;
  }

  .save-btn:hover { background: var(--sage-deep); }
  .save-btn:active { transform: scale(0.98); }

  /* ── HISTORY ── */
  .history-heading {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 18px;
    padding: 0 4px;
  }

  .entries {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .entry-card {
    background: var(--card);
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.04);
    border-left: 6px solid var(--pink);
    animation: cardIn 0.3s ease-out both;
  }

  .entry-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .entry-date {
    font-size: 14px;
    font-weight: 700;
    color: var(--sage-deep);
  }

  .delete-btn {
    background: transparent;
    color: var(--pink-deep);
    border: none;
    border-radius: 14px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease;
    font-family: inherit;
  }

  .delete-btn:hover { background: #FBEFF1; }

  .gratitude-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .gratitude-list li {
    position: relative;
    padding-left: 22px;
    font-size: 16px;
    line-height: 1.5;
    color: var(--text);
  }

  .gratitude-list li::before {
    content: '';
    position: absolute;
    left: 2px;
    top: 0.65em;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--sage);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-soft);
    font-size: 15px;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    body { padding: 20px 14px; }
    .today-card { padding: 24px 20px; border-radius: 22px; }
    .header h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>Gratitude Journal</h1>
    <p class="encouragement">Small joys count.</p>
  </div>

  <div class="today-card">
    <p class="prompt-text">What are three things you're grateful for today?</p>
    <div class="input-group">
      <input type="text" class="gratitude-input" id="item1" placeholder="One thing..." autocomplete="off" />
      <input type="text" class="gratitude-input" id="item2" placeholder="Another thing..." autocomplete="off" />
      <input type="text" class="gratitude-input" id="item3" placeholder="One more thing..." autocomplete="off" />
    </div>
    <button class="save-btn" id="saveBtn" type="button">Save Today's Entry</button>
  </div>

  <p class="history-heading">Previous Entries</p>
  <div class="entries" id="entriesList"></div>

</div>

<script>
(function() {
  var STORAGE_KEY = 'gratitudeJournal_v1';
  var entries = [];

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    } catch(e) {
      entries = [];
    }
    render();
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
  }

  function makeId() {
    return Date.now() + '_' + Math.floor(Math.random() * 100000);
  }

  function formatDate(iso) {
    var d = new Date(iso);
    return d.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function saveEntry() {
    var v1 = document.getElementById('item1').value.trim();
    var v2 = document.getElementById('item2').value.trim();
    var v3 = document.getElementById('item3').value.trim();
    var items = [v1, v2, v3].filter(Boolean);

    if (items.length === 0) return;

    var createdAt = new Date().toISOString();
    entries.unshift({
      id: makeId(),
      createdAt: createdAt,
      displayDate: formatDate(createdAt),
      items: items
    });

    save();

    document.getElementById('item1').value = '';
    document.getElementById('item2').value = '';
    document.getElementById('item3').value = '';

    render();
  }

  function deleteEntry(id) {
    entries = entries.filter(function(e) { return e.id !== id; });
    save();
    render();
  }

  function render() {
    var list = document.getElementById('entriesList');
    list.innerHTML = '';

    if (entries.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'No entries yet. Start with three small joys from today.';
      list.appendChild(empty);
      return;
    }

    entries.forEach(function(entry) {
      var card = document.createElement('article');
      card.className = 'entry-card';

      var top = document.createElement('div');
      top.className = 'entry-top';

      var date = document.createElement('span');
      date.className = 'entry-date';
      date.textContent = entry.displayDate || formatDate(entry.createdAt);

      var del = document.createElement('button');
      del.type = 'button';
      del.className = 'delete-btn';
      del.textContent = 'Delete';
      del.addEventListener('click', function() { deleteEntry(entry.id); });

      top.appendChild(date);
      top.appendChild(del);

      var ul = document.createElement('ul');
      ul.className = 'gratitude-list';
      entry.items.forEach(function(item) {
        var li = document.createElement('li');
        li.textContent = item;
        ul.appendChild(li);
      });

      card.appendChild(top);
      card.appendChild(ul);
      list.appendChild(card);
    });
  }

  document.getElementById('saveBtn').addEventListener('click', saveEntry);

  load();
})();
</script>
</body>
</html>
